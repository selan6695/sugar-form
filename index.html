<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>畫糖文化體驗課程 預約填單</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--green:#D4690A;--bg:#fffaf0;--border:rgba(180,100,0,0.2);--text:#1a1a1a;--muted:#8a6a3a}
html,body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;color:var(--text);font-size:14px}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 60px}
.header{text-align:center;padding:24px 0 20px}
.header .icon{font-size:40px}
.header h1{font-size:20px;font-weight:700;margin-top:8px}
.header p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.6}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;border:0.5px solid var(--border)}
.sec-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.07em;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{font-size:13px;color:var(--muted);font-weight:500}
.field input,.field select{font-size:15px;padding:11px 13px;border-radius:10px;border:0.5px solid var(--border);outline:none;width:100%;font-family:inherit;background:#fff;color:var(--text);-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(212,105,10,0.12)}
.hint{font-size:12px;color:var(--muted);margin-top:3px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.session-card{background:var(--bg);border-radius:10px;padding:12px;margin-bottom:8px;border:0.5px solid var(--border)}
.session-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.session-num{font-size:13px;font-weight:600;color:var(--green)}
.btn-del{border:none;background:rgba(192,57,43,0.1);color:#c0392b;border-radius:20px;padding:3px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-add-session{width:100%;padding:11px;border-radius:10px;border:0.5px dashed #D4690A;background:transparent;color:#D4690A;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}
.result-box{background:#fff;border-radius:14px;padding:18px;margin-top:16px;border:0.5px solid var(--border);display:none}
.result-text{font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--text);background:var(--bg);border-radius:10px;padding:14px;max-height:300px;overflow-y:auto}
.btn-gen{width:100%;padding:15px;border-radius:12px;border:none;background:#D4690A;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px;box-shadow:0 2px 10px rgba(212,105,10,0.35)}
.btn-gen:active{opacity:.85}
.btn-gen:disabled{opacity:.5;cursor:not-allowed}
.btn-copy{width:100%;padding:13px;border-radius:12px;border:0.5px solid var(--border);background:#fff;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.78);color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.notice{background:#fff3cd;border-radius:10px;padding:12px;font-size:12px;color:#7a5000;line-height:1.7;margin-bottom:14px;border:0.5px solid #f0c060}
.success-banner{background:#e6f9ee;border:0.5px solid #1a7a4a;border-radius:12px;padding:16px;text-align:center;margin-top:16px;display:none}
.success-banner .icon{font-size:32px;margin-bottom:8px}
.success-banner h2{font-size:16px;font-weight:700;color:#1a7a4a;margin-bottom:6px}
.success-banner p{font-size:13px;color:#2a6a4a;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="icon">🐲</div>
    <h1>畫糖文化體驗課程<br>預約填單</h1>
    <p>請填寫以下資料，送出後阿斌師會收到通知並回覆您</p>
  </div>

  <div class="notice">
    📌 費用說明：500元/每位學員<br>
    📌 定金：每堂 2000元，確認後轉帳<br>
    📌 填完後請按「送出預約」，阿斌師會盡快回覆您
  </div>

  <div class="card">
    <div class="sec-title">聯絡資料</div>
    <div class="field"><label>姓名 *</label><input type="text" id="c-name" placeholder="您的姓名"></div>
    <div class="field">
      <label>聯絡平台 *</label>
      <select id="c-platform">
        <option value="">請選擇聯絡平台</option>
        <option value="Messenger">Messenger</option>
        <option value="Instagram">Instagram</option>
        <option value="LINE">LINE</option>
      </select>
    </div>
    <div class="field">
      <label>你在該平台上的名字 *</label>
      <input type="text" id="c-lineid" placeholder="填你傳訊息給阿斌師時顯示的名字">
      <div class="hint" style="color:#D4690A">就是你平常傳訊息給阿斌師時，對方看到的你的名字</div>
    </div>
    <div class="field"><label>手機號碼 *</label><input type="tel" id="c-phone" placeholder="09XX-XXX-XXX"></div>
  </div>

  <div class="card">
    <div class="sec-title">課程資訊</div>
    <div class="field">
      <label>上課地區 *</label>
      <select id="c-region" onchange="showRegionInfo()">
        <option value="">請選擇地區</option>
        <option value="taipei">雙北（台北／新北）｜最低 12 人</option>
        <option value="zhuzhu">桃竹苗（桃園／新竹／苗栗）｜最低 10 人</option>
        <option value="keelung">基隆｜最低 20 人</option>
        <option value="taichung">台中｜最低 20 人</option>
      </select>
      <div id="region-info" style="font-size:12px;color:#D4690A;margin-top:4px;display:none"></div>
    </div>
    <div class="field"><label>上課地址 *</label><input type="text" id="c-addr" placeholder="請填寫詳細地址"></div>
  </div>

  <div class="card">
    <div class="sec-title">上課日期與時間（可新增多堂）</div>
    <div id="sessions-wrap"></div>
    <button class="btn-add-session" onclick="addSession()">＋ 新增堂次</button>
  </div>

  <button class="btn-gen" id="btn-submit" onclick="submitBooking()">送出預約</button>

  <!-- 送出成功畫面 -->
  <div class="success-banner" id="success-banner">
    <div class="icon">✅</div>
    <h2>預約資料已送出！</h2>
    <p>阿斌師已收到您的預約資料<br>會盡快透過 <span id="s-platform"></span> 聯繫您<br>請確認訊息通知已開啟</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase 設定（與管理系統相同）──
const SURL='https://hfumliowejworifplzft.supabase.co';
const SKEY='sb_publishable_Lw_0aQYMQ2ApdK4Ssas_3g_Qnjy78j-';
const db=supabase.createClient(SURL,SKEY);

const REGIONS={
  taipei:{label:'雙北（台北／新北）',minPax:12,travel:500},
  zhuzhu:{label:'桃竹苗（桃園／新竹／苗栗）',minPax:10,travel:500},
  keelung:{label:'基隆',minPax:20,travel:1000},
  taichung:{label:'台中',minPax:20,travel:1000}
};
let sessionCount=0;

function showRegionInfo(){
  const key=document.getElementById('c-region').value;
  const reg=REGIONS[key];
  const info=document.getElementById('region-info');
  if(reg){
    info.textContent=`📌 最低開班 ${reg.minPax} 人・未達人數仍開班以 ${reg.minPax} 人計費・交通費 ${reg.travel.toLocaleString()} 元`;
    info.style.display='block';
  } else {
    info.style.display='none';
  }
}

function makeTimeOptions(){
  let h='<option value="">請選擇時間</option>';
  for(let i=6;i<=22;i++) for(let m=0;m<60;m+=30){
    if(i===22&&m>0)break;
    const v=`${String(i).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    h+=`<option value="${v}">${v}</option>`;
  }
  return h;
}

function addSession(){
  sessionCount++;
  const div=document.createElement('div');
  div.className='session-card'; div.id=`sess-${sessionCount}`;
  div.innerHTML=`
    <div class="session-head">
      <span class="session-num">第 ${sessionCount} 堂</span>
      ${sessionCount>1?`<button class="btn-del" onclick="delSession('sess-${sessionCount}')">刪除</button>`:''}
    </div>
    <div class="row2">
      <div class="field"><label>上課日期</label><input type="date" class="s-date"></div>
      <div class="field"><label>上課時間（1.5～2小時）</label><select class="s-time">${makeTimeOptions()}</select></div>
    </div>`;
  document.getElementById('sessions-wrap').appendChild(div);
}

function delSession(id){
  const el=document.getElementById(id);
  if(el)el.remove();
  document.querySelectorAll('.session-card').forEach((card,i)=>{
    card.querySelector('.session-num').textContent=`第 ${i+1} 堂`;
  });
}

function getSessions(){
  return Array.from(document.querySelectorAll('.session-card')).map(card=>({
    date:card.querySelector('.s-date').value,
    time:card.querySelector('.s-time').value
  })).filter(s=>s.date);
}

function ff(s){
  if(!s)return'＿';
  const d=new Date(s+'T00:00:00'),w=['日','一','二','三','四','五','六'];
  return`${d.getMonth()+1}/${d.getDate()}（${w[d.getDay()]}）`;
}

function fd(d){return`${d.getMonth()+1}/${d.getDate()}`}

function buildMsg1(rec){
  const reg=REGIONS[rec.region_key]||{minPax:12,travel:0,label:''};
  const sessions=rec.sessions||[];
  const nSessions=sessions.length||1;
  const sessionLines=sessions.map((s,i)=>`第${i+1}堂：${ff(s.date)} ${s.time||'＿'}`).join('\n');
  const tl=reg.travel>0?`\n💰交通費：${reg.travel}元（${reg.label}地區）`:'';
  const deposit=nSessions*2000;
  const name=rec.name_en?`${rec.name_zh}（${rec.name_en}）`:rec.name_zh;
  return `${sessions[0]?.date?ff(sessions[0].date):''}🐲【糖畫職人教你畫】
『畫糖文化體驗課程預約單』：

聯絡人：${name||'＿'}
電話  : ${rec.phone||'＿'}
地址 ：${rec.addr||'＿'}

${sessionLines}

💰課程費用：500元/每位學員
📚此地區最低開班人數：${reg.minPax}人
⚠️未達最低開班人數若仍要開班，將以${reg.minPax}人計費${tl}

💰定金：${deposit.toLocaleString()}元（${nSessions}堂 × 2000元）

銀行：中國信託新竹分行（822）
帳號：299531713389

❤️請於 ${rec.dep_due||'＿'} 前將定金${deposit.toLocaleString()}元轉帳至以上帳號，感謝你。
未收到定金該日即開放其他人預約。

⚠️收到定金後，我將在 ${rec.conf_due||'＿'} 前確認最後上課人數，再發出課程確認單給您，完成✅尾款交付後課程即成立。


❇也歡迎使用 Line Pay 一卡通，阿斌師✳️Line ID：selanchen

⭐️⭐️⭐️⭐️⭐️
課程評價：
https://forms.gle/c9BdP2AvetGpF5Es7

媒體報導：
TVBS 一步一腳印 發現新台灣 專訪
https://youtu.be/WNZefc0IteY

課程簡介與預約課程注意事項⚠️
https://reurl.cc/A8nYgQ


🍎課程預約說明🍎（一定要看）

⚠️1. 確定上課日期後請於三日內付（每堂）定金2000元，之後會從尾款中扣除；指定日期內未繳交定金則該日期不為你保留，並開放給其他人預約。

⚠️2. 課程尾款在上課日5天前須付清；指定日期未收到尾款則視同取消不退回定金。
🌟（不接受當天付費）

3. 付定金後取消預約或未達最低上課人數則不退回定金。
4. 確定日期並付定金後不接受更改日期或延期，視同取消不退回定金。
5. 上課日三天之前取消上課退費50%。

🚧《場地需求》🚧（一定要看）

1. 學員可以不需要桌面，有椅子坐或地板乾淨也可以坐在地板上課（前方準備一張長桌+6張椅子給阿斌師）
2. 上課現場需要110V插座（2個）。請確認插座有電可以正常使用。
3. 上課場地等費用、清潔費..等我方不負責。
4. 因場地、電力…等問題造成課程無法進行，由主辦方負責。
5. 開課人數依車程（或縣市）而有所不同，若預約後變更地點可能產生車馬費須由你支付。
6. 教學設備老師會使用推車載運，無法推車及1F以上無電梯請提前告知。
7. 準時上課不等人，老師會提早30分鐘到現場安排課程配置。
8. 若需要阿斌師協助招生，請告知。我會將你的FB傳給想上課的朋友，她們會私訊你報名。

🍒務必確認以上資訊。
🍀可配合以上事項內容再繳付定金，謝謝。`;
}

async function submitBooking(){
  const name=document.getElementById('c-name').value.trim();
  const platform=document.getElementById('c-platform').value;
  const lineid=document.getElementById('c-lineid').value.trim();
  const phone=document.getElementById('c-phone').value.trim();
  const regionKey=document.getElementById('c-region').value;
  const addr=document.getElementById('c-addr').value.trim();
  const sessions=getSessions();

  if(!name){showToast('請填寫姓名');return;}
  if(!platform){showToast('請選擇聯絡平台');return;}
  if(!lineid){showToast('請填寫你在該平台上的名字');return;}
  if(!phone){showToast('請填寫手機號碼');return;}
  if(!regionKey){showToast('請選擇地區');return;}
  if(!addr){showToast('請填寫上課地址');return;}
  if(!sessions.length){showToast('請填寫至少一個上課日期');return;}

  const reg=REGIONS[regionKey];

  // 計算日期
  const dep=new Date(); dep.setDate(dep.getDate()+3);
  const depDue=fd(dep);
  const dates=sessions.map(s=>s.date).filter(Boolean).sort();
  let confDue='＿';
  if(dates[0]){
    const d=new Date(dates[0]+'T00:00:00'); d.setDate(d.getDate()-7);
    confDue=fd(d);
  }

  const rec={
    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
    name_zh: name,
    name_en: `${platform}：${lineid}`,
    phone,
    region_key: regionKey,
    region: reg.label,
    addr,
    sessions,
    dep_due: depDue,
    conf_due: confDue,
    status: 'pending',
    final_pax: null,
    balance: null,
    created_at: new Date().toISOString()
  };
  rec.msg1 = buildMsg1(rec);

  // 鎖住按鈕，避免重複送出
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;
  btn.textContent='送出中…';

  const {error}=await db.from('bookings').insert(rec);

  if(error){
    btn.disabled=false;
    btn.textContent='送出預約';
    showToast('送出失敗，請稍後再試');
    console.error(error);
    return;
  }

  // 成功
  btn.style.display='none';
  document.getElementById('s-platform').textContent=platform;
  document.getElementById('success-banner').style.display='block';
  document.getElementById('success-banner').scrollIntoView({behavior:'smooth'});
  showToast('預約已送出！✓');
}

function showToast(txt){
  const t=document.getElementById('toast');
  t.textContent=txt; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// 預設一堂
addSession();
</script>
</body>
</html>
