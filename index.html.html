<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="糖畫預約">
<title>畫糖預約管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--green:#1D9E75;--orange:#D4690A;--red:#c0392b;--blue:#2277cc;--bg:#f5f5f3;--card:#fff;--border:rgba(0,0,0,0.1);--text:#1a1a1a;--muted:#888;--warn-bg:#fff8ee;--warn:#c26a00;--success-bg:#e6f9ee;--success:#1a7a4a;--purple-bg:#f3eeff;--purple:#6b3fa0}
html,body{height:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;color:var(--text);font-size:14px;padding-bottom:80px}
.app-wrap{max-width:500px;margin:0 auto;background:var(--bg);min-height:100vh;box-shadow:0 0 60px rgba(0,0,0,0.08)}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;height:64px;background:#fff;border-top:0.5px solid var(--border);display:flex;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--muted);cursor:pointer;border:none;background:transparent;font-family:inherit}
.tab-item.active{color:var(--green)}
.tab-icon{font-size:24px}
.screen{display:none;padding:16px}
.screen.active{display:block}
.page-head{padding:20px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.page-head h1{font-size:22px;font-weight:700}
.btn-add{width:38px;height:38px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(29,158,117,0.35)}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:12px;padding:10px 6px;text-align:center;border:0.5px solid var(--border)}
.stat-num{font-size:20px;font-weight:700}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:0.5px solid var(--border);cursor:pointer}
.card:active{opacity:.7}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{font-size:15px;font-weight:600}
.card-meta{font-size:12px;color:var(--muted);margin-top:3px}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-pending{background:var(--warn-bg);color:var(--warn)}
.badge-deposit{background:#e8f0ff;color:#2255aa}
.badge-reconfirm{background:var(--purple-bg);color:var(--purple)}
.badge-confirmed{background:var(--success-bg);color:var(--success)}
.badge-cancelled{background:#f0f0ee;color:#aaa}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 14px;border-radius:20px;border:0.5px solid var(--border);background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text);flex-shrink:0}
.filter-chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-width:500px;max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:13px;color:var(--muted);font-weight:500}
.field input,.field select{font-size:15px;padding:11px 13px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.2);outline:none;width:100%;font-family:inherit;background:#fff;color:var(--text);-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,0.12)}
.field input[readonly]{background:var(--bg);color:var(--muted)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hint{font-size:12px;color:var(--muted);margin-top:2px}
.auto-tag{font-size:11px;padding:2px 6px;border-radius:20px;background:#e8f4ff;color:var(--blue);margin-left:4px}
.sec-div{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;margin:18px 0 10px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
/* 課程日期列 */
.session-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--bg);border-radius:10px;padding:10px 12px}
.session-row .row2{flex:1}
.session-row input,.session-row select{font-size:14px;padding:8px 10px}
.btn-del-session{width:32px;height:32px;border-radius:50%;border:none;background:rgba(192,57,43,0.1);color:var(--red);font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.btn-add-session{width:100%;padding:10px;border-radius:10px;border:0.5px dashed var(--green);background:transparent;color:var(--green);font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}
.add-menu{position:fixed;bottom:82px;right:16px;display:none;flex-direction:column;gap:8px;z-index:150;align-items:flex-end}
.add-menu.open{display:flex}
.add-menu-btn{padding:10px 18px;border-radius:20px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 2px 12px rgba(0,0,0,0.18);white-space:nowrap}
.paste-area{width:100%;min-height:120px;padding:12px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.2);font-size:14px;font-family:inherit;resize:vertical;outline:none}
.paste-area:focus{border-color:var(--green)}
/* 費用提示 */
.fee-notice{background:var(--bg);border-radius:10px;padding:12px;font-size:13px;color:var(--muted);line-height:1.6;margin-top:8px}
.fee-notice strong{color:var(--text)}
.calc-box{background:var(--bg);border-radius:10px;padding:13px;font-size:14px;display:flex;flex-direction:column;gap:7px;margin-top:10px}
.calc-row{display:flex;justify-content:space-between;color:var(--muted)}
.calc-row.total{font-weight:700;color:var(--text);border-top:0.5px solid var(--border);padding-top:7px;margin-top:2px;font-size:15px}
.msg-preview{background:var(--bg);border-radius:10px;padding:13px;font-size:12px;line-height:1.85;white-space:pre-wrap;color:var(--text);max-height:180px;overflow-y:auto}
.btn-main{width:100%;padding:15px;border-radius:12px;border:none;background:var(--green);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;box-shadow:0 2px 10px rgba(29,158,117,0.3)}
.btn-main:active{opacity:.85}
.btn-main.blue{background:#2255aa;box-shadow:none}
.btn-main.purple{background:var(--purple);box-shadow:none}
.btn-main.secondary{background:transparent;border:0.5px solid var(--border);color:var(--text);box-shadow:none;margin-top:6px}
.btn-main.danger-outline{background:transparent;border:0.5px solid rgba(192,57,43,0.3);color:var(--red);box-shadow:none;margin-top:6px}
.btn-main.red{background:#c0392b;box-shadow:0 2px 10px rgba(192,57,43,0.3)}
.info-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border);font-size:14px;gap:12px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--muted);flex-shrink:0}
.info-val{font-weight:500;text-align:right}
.step-bar{display:flex;align-items:center;margin:16px 0 20px}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.step-dot{width:28px;height:28px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#fff}
.step.current .step-dot{border-color:var(--green);color:var(--green)}
.step-line{flex:1;height:2px;background:var(--border);margin-bottom:14px}
.step-line.done{background:var(--green)}
.report-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;border:0.5px solid var(--border)}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:48px 0}
.sec-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;margin-bottom:8px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.78);color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* 確認單編輯 */
.confirm-pax-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:6px}
.cpax-btn{padding:8px 2px;border-radius:7px;border:0.5px solid rgba(0,0,0,0.15);background:transparent;font-size:13px;cursor:pointer;text-align:center;color:var(--text);font-family:inherit}
.cpax-btn.active{background:#c0392b;color:#fff;border-color:#c0392b;font-weight:600}
</style>
</head>
<body>
<div class="app-wrap">
  <div class="page-head">
    <h1 id="page-title">總覽</h1>
    <button class="btn-add" id="btn-add" onclick="toggleAddMenu()">+</button>
  </div>

  <!-- 浮動選單 -->
  <div class="add-menu" id="add-menu">
    <button class="add-menu-btn" style="background:#fff;color:var(--text)" onclick="openNewBooking()">✏️ 手動新增預約</button>
    <button class="add-menu-btn" style="background:var(--green);color:#fff" onclick="openPasteModal()">📋 貼上客戶資料</button>
  </div>
  <div class="screen active" id="screen-home">
    <div class="stat-row" id="stats"></div>
    <div class="sec-label">待處理</div>
    <div id="home-list"></div>
  </div>
  <div class="screen" id="screen-list">
    <div class="filter-bar" id="filter-bar"></div>
    <div id="booking-list"></div>
  </div>
  <div class="screen" id="screen-report">
    <button class="btn-main blue" onclick="exportCSV()" style="margin-bottom:16px">📥 匯出 Excel（CSV）</button>
    <div class="sec-label">依地區</div><div id="report-region"></div>
    <div class="sec-label" style="margin-top:16px">依月份</div><div id="report-month"></div>
    <div class="sec-label" style="margin-top:16px">收款統計</div><div id="report-money"></div>
  </div>
  <nav class="tab-bar">
    <button class="tab-item active" id="tab-home" onclick="switchTab('home')"><span class="tab-icon">🏠</span>總覽</button>
    <button class="tab-item" id="tab-list" onclick="switchTab('list')"><span class="tab-icon">📋</span>預約</button>
    <button class="tab-item" id="tab-report" onclick="switchTab('report')"><span class="tab-icon">📊</span>報表</button>
  </nav>
</div>

<!-- 新增/編輯預約 Modal -->
<div class="modal-bg" id="booking-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">新增預約</h2>
    <div class="sec-div">客戶資料</div>
    <div class="row2">
      <div class="field"><label>中文姓名 *</label><input type="text" id="m-name-zh" placeholder="王小明" autocomplete="off"></div>
      <div class="field"><label>英文名</label><input type="text" id="m-name-en" placeholder="Mimi" autocomplete="off"></div>
    </div>
    <div class="field"><label>手機號碼</label><input type="tel" id="m-phone" placeholder="09XX-XXX-XXX"></div>
    <div class="sec-div">課程資訊</div>
    <div class="field">
      <label>地區（含最低人數）*</label>
      <select id="m-region" onchange="onRegionChange()">
        <option value="">請選擇地區</option>
        <option value="taipei">雙北（台北／新北）｜最低 12 人</option>
        <option value="zhuzhu">桃竹苗（桃園／新竹／苗栗）｜最低 10 人</option>
        <option value="keelung">基隆｜最低 20 人</option>
        <option value="taichung">台中｜最低 20 人</option>
      </select>
    </div>
    <div class="field"><label>上課地址</label><input type="text" id="m-addr" placeholder="詳細地址" autocomplete="off"></div>
    <div class="sec-div">上課日期與時間（可新增多堂）</div>
    <div id="sessions-wrap"></div>
    <button class="btn-add-session" onclick="addSession()">＋ 新增堂次</button>
    <div class="row2" style="margin-top:12px">
      <div class="field">
        <label>定金截止 <span class="auto-tag">自動</span></label>
        <input type="text" id="m-dep-due" readonly>
        <div class="hint">今天 +3 天</div>
      </div>
      <div class="field">
        <label>確認截止 <span class="auto-tag">自動</span></label>
        <input type="text" id="m-conf-due" readonly>
        <div class="hint">最早日期 -7 天</div>
      </div>
    </div>
    <div class="sec-div">費用說明</div>
    <div class="fee-notice" id="fee-notice">請先選擇地區</div>
    <div class="calc-box" id="m-calc"></div>
    <div class="sec-div">訊息預覽</div>
    <div class="msg-preview" id="m-preview" style="color:#aaa">填寫完整後顯示…</div>
    <button class="btn-main" onclick="saveBooking()">💾 儲存並複製預約單</button>
    <button class="btn-main secondary" onclick="closeModal('booking-modal')">取消</button>
  </div>
</div>

<!-- 詳情 Modal -->
<div class="modal-bg" id="detail-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <h2 id="d-name" style="margin:0;font-size:18px"></h2>
      <span id="d-badge" class="badge"></span>
    </div>
    <div id="d-steps" class="step-bar"></div>
    <div id="d-info"></div>
    <div id="d-actions" style="margin-top:16px"></div>
    <button class="btn-main secondary" onclick="closeModal('detail-modal')">關閉</button>
  </div>
</div>

<!-- 確認單編輯 Modal -->
<div class="modal-bg" id="confirm-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 style="color:#c0392b">✎ 編輯確認單</h2>
    <div class="sec-div">最終上課人數</div>
    <div class="field"><label>選擇實際人數</label><div id="confirm-pax-grid" class="confirm-pax-grid"></div></div>
    <div class="calc-box" id="confirm-calc"></div>
    <div class="sec-div">預覽確認單</div>
    <div class="msg-preview" id="confirm-preview"></div>
    <button class="btn-main red" onclick="copyConfirmMsg()">📋 複製確認單</button>
    <button class="btn-main secondary" onclick="closeModal('confirm-modal')">關閉</button>
  </div>
</div>

<!-- 訊息 Modal -->
<div class="modal-bg" id="msg-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="msg-title">訊息</h2>
    <div class="msg-preview" id="msg-content"></div>
    <button class="btn-main" onclick="copyMsg()">📋 複製訊息</button>
    <button class="btn-main secondary" onclick="closeModal('msg-modal')">關閉</button>
  </div>
</div>

<!-- 貼上客戶資料 Modal -->
<div class="modal-bg" id="paste-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>貼上客戶資料</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">將客戶傳來的預約資料貼入下方，按「解析並生成」</p>
    <textarea class="paste-area" id="paste-area" placeholder="【畫糖課程預約資料】
姓名：王小明
LINE ID：abc123
電話：0912-345-678
地區：雙北（台北／新北）
地址：台北市...
堂數：1堂
第1堂：6/6（六） 14:00
定金：2000元
---以上資料請勿修改---"></textarea>
    <button class="btn-main" onclick="parseAndFill()" style="margin-top:12px">🔍 解析並生成預約單</button>
    <button class="btn-main secondary" onclick="closeModal('paste-modal')">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SURL='https://hfumliowejworifplzft.supabase.co';
const SKEY='sb_publishable_Lw_0aQYMQ2ApdK4Ssas_3g_Qnjy78j-';
const db=supabase.createClient(SURL,SKEY);

const REGIONS={
  taipei:{label:'雙北',travel:500,minPax:12},
  zhuzhu:{label:'桃竹苗',travel:500,minPax:10},
  keelung:{label:'基隆',travel:1000,minPax:20},
  taichung:{label:'台中',travel:1000,minPax:20}
};
const STATUS={
  pending:{label:'待收定金',cls:'badge-pending'},
  deposit:{label:'已收定金',cls:'badge-deposit'},
  reconfirm:{label:'待確認人數',cls:'badge-reconfirm'},
  confirmed:{label:'已收尾款',cls:'badge-confirmed'},
  cancelled:{label:'已取消',cls:'badge-cancelled'}
};

let books=[], editingId=null, currentFilter='all', currentMsg='';
let confirmBookId=null, confirmPax=0;

// 時間選單
function makeTimeOptions(){
  let h='<option value="">請選擇</option>';
  for(let i=6;i<=22;i++) for(let m=0;m<60;m+=30){
    if(i===22&&m>0)break;
    const v=`${String(i).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    h+=`<option value="${v}">${v}</option>`;
  }
  return h;
}

function fd(d){return`${d.getMonth()+1}/${d.getDate()}`}
function ff(s){if(!s)return'';const d=new Date(s+'T00:00:00'),w=['日','一','二','三','四','五','六'];return`${d.getMonth()+1}/${d.getDate()}（${w[d.getDay()]}）`}
function fm(s){if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`}

async function loadBooks(){
  const{data,error}=await db.from('bookings').select('*').order('created_at',{ascending:false});
  if(error){showToast('載入失敗');return[];}
  return data||[];
}
async function upsert(rec){
  const{error}=await db.from('bookings').upsert(rec,{onConflict:'id'});
  if(error){showToast('儲存失敗：'+error.message);return false;}
  return true;
}
async function del(id){
  const{error}=await db.from('bookings').delete().eq('id',id);
  if(error){showToast('刪除失敗');return false;}
  return true;
}

function switchTab(name){
  ['home','list','report'].forEach(t=>{
    document.getElementById('screen-'+t).classList.toggle('active',t===name);
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
  });
  const titles={home:'總覽',list:'預約紀錄',report:'報表分析'};
  document.getElementById('page-title').textContent=titles[name];
  document.getElementById('btn-add').style.display=name==='report'?'none':'flex';
  renderAll();
}

function renderHome(){
  const pend=books.filter(b=>b.status==='pending').length;
  const dep=books.filter(b=>b.status==='deposit').length;
  const reconf=books.filter(b=>b.status==='reconfirm').length;
  const conf=books.filter(b=>b.status==='confirmed').length;
  const active=books.filter(b=>b.status!=='cancelled').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-num">${active}</div><div class="stat-label">總預約</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${pend+dep}</div><div class="stat-label">進行中</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--purple)">${reconf}</div><div class="stat-label">待確認</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${conf}</div><div class="stat-label">已完成</div></div>`;
  const urgent=books.filter(b=>['pending','deposit','reconfirm'].includes(b.status)).slice(0,6);
  document.getElementById('home-list').innerHTML=urgent.length?urgent.map(bookCard).join(''):'<div class="empty">沒有待處理項目 🎉</div>';
}

function renderList(){
  const regions=[...new Set(books.map(b=>b.region).filter(Boolean))];
  const chips=[
    {v:'all',l:'全部'},{v:'pending',l:'待收定金'},{v:'deposit',l:'已收定金'},
    {v:'reconfirm',l:'待確認人數'},{v:'confirmed',l:'已完成'},{v:'cancelled',l:'已取消'},

  ];
  document.getElementById('filter-bar').innerHTML=chips.map(f=>`<button class="filter-chip${currentFilter===f.v?' active':''}" onclick="setFilter('${f.v}')">${f.l}</button>`).join('');

function parseAndFill(){
  const txt=document.getElementById('paste-area').value.trim();
  if(!txt){showToast('請先貼上客戶資料');return;}

  const get=(key)=>{
    const re=new RegExp(key+'[：:]+(.+)');
    const m=txt.match(re);
    return m?m[1].trim():'';
  };

  const name=get('姓名');
  const lineid=get('LINE ID');
  const phone=get('電話');
  const regionRaw=get('地區');
  const addr=get('地址');

  // 解析地區
  let regionKey='';
  if(regionRaw.includes('雙北')||regionRaw.includes('台北')||regionRaw.includes('新北'))regionKey='taipei';
  else if(regionRaw.includes('桃')||regionRaw.includes('竹')||regionRaw.includes('苗'))regionKey='zhuzhu';
  else if(regionRaw.includes('基隆'))regionKey='keelung';
  else if(regionRaw.includes('台中'))regionKey='taichung';

  // 解析堂次：「第N堂：6/6（六） 14:00」
  const sessionMatches=[...txt.matchAll(/第\d+堂[：:]+([^\n]+)/g)];
  const sessions=sessionMatches.map(m=>{
    const raw=m[1].trim();
    // 解析日期：找 數字/數字
    const dateMatch=raw.match(/(\d+)\/(\d+)/);
    const timeMatch=raw.match(/(\d{2}:\d{2})/);
    let date='';
    if(dateMatch){
      const now=new Date();
      const mo=parseInt(dateMatch[1]);
      const dy=parseInt(dateMatch[2]);
      let yr=now.getFullYear();
      if(mo<now.getMonth()+1)yr++;
      date=`${yr}-${String(mo).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;
    }
    return{date, time:timeMatch?timeMatch[1]:''};
  }).filter(s=>s.date);

  if(!name){showToast('找不到姓名，請確認格式');return;}

  // 填入表單
  closeModal('paste-modal');
  editingId=null; sessionCount=0;
  document.getElementById('modal-title').textContent='新增預約（客戶資料）';
  document.getElementById('m-name-zh').value=name;
  document.getElementById('m-name-en').value=lineid; // LINE ID 填入英文名欄位
  document.getElementById('m-phone').value=phone;
  document.getElementById('m-region').value=regionKey;
  document.getElementById('m-addr').value=addr;
  document.getElementById('m-dep-due').value='';
  document.getElementById('m-conf-due').value='';
  document.getElementById('sessions-wrap').innerHTML='';
  if(sessions.length){sessions.forEach(s=>addSession(s.date,s.time));}
  else addSession();
  onRegionChange();
  const dep=new Date(); dep.setDate(dep.getDate()+3);
  document.getElementById('m-dep-due').value=fd(dep);
  openModal('booking-modal');
  showToast('資料已帶入，請確認後儲存');
}

function openEdit(id){
  const b=books.find(x=>x.id===id); if(!b)return;
  editingId=id; sessionCount=0;
  document.getElementById('modal-title').textContent='編輯預約';

  document.getElementById('m-phone').value=b.phone||'';
  document.getElementById('m-region').value=b.region_key||'';
  document.getElementById('m-addr').value=b.addr||'';
  document.getElementById('m-dep-due').value=b.dep_due||'';
  document.getElementById('m-conf-due').value=b.conf_due||'';

  if(sessions.length){sessions.forEach(s=>addSession(s.date,s.time));}

async function saveBooking(){
  const name_zh=document.getElementById('m-name-zh').value.trim();
  const region_key=document.getElementById('m-region').value;
  const sessions=getSessions();
  if(!name_zh){showToast('請填寫姓名');return;}
  if(!region_key){showToast('請選擇地區');return;}
  if(!sessions.length){showToast('請填寫至少一個上課日期');return;}
  const reg=REGIONS[region_key];
  const existing=editingId?books.find(x=>x.id===editingId):null;
  const rec={
    id:editingId||(crypto.randomUUID?crypto.randomUUID():Date.now().toString()),
    name_zh, name_en:document.getElementById('m-name-en').value.trim(),
    phone:document.getElementById('m-phone').value.trim(),
    region_key, region:reg.label,
    addr:document.getElementById('m-addr').value.trim(),
    sessions,
    dep_due:document.getElementById('m-dep-due').value,
    conf_due:document.getElementById('m-conf-due').value,
    status:existing?.status||'pending',
    final_pax:existing?.final_pax||null,
    balance:existing?.balance||null,
  };
  rec.msg1=buildMsg1(rec);
  if(!(await upsert(rec)))return;
  const idx=books.findIndex(x=>x.id===rec.id);
  if(idx>=0)books[idx]=rec; else books.unshift(rec);
  closeModal('booking-modal');
  showMsg(rec.msg1,'預約單（已複製，可貼到 LINE）');
  renderAll();
}

function showMsg(msg,title){
  currentMsg=msg;
  document.getElementById('msg-title').textContent=title||'訊息';
  document.getElementById('msg-content').textContent=msg;
  navigator.clipboard.writeText(msg).catch(()=>{});
  openModal('msg-modal');
}
function copyMsg(){
  navigator.clipboard.writeText(currentMsg).then(()=>showToast('已複製 ✓')).catch(()=>showToast('請長按文字複製'));
  closeModal('msg-modal');
}

function renderReport(){
  const active=books.filter(b=>b.status!=='cancelled');
  const byR={}, byM={};
  active.forEach(b=>{
    const r=b.region||'未知'; if(!byR[r])byR[r]={n:0,dep:0}; byR[r].n++;
    byR[r].dep+=((b.sessions||[]).length||1)*2000;
    const m=fm((b.sessions||[])[0]?.date)||'未知'; if(!byM[m])byM[m]={n:0}; byM[m].n++;
  });
  document.getElementById('report-region').innerHTML=Object.keys(byR).length
    ?Object.entries(byR).sort((a,b)=>b[1].n-a[1].n).map(([r,v])=>`<div class="report-card"><div class="report-row"><div><div style="font-weight:600;font-size:15px">${r}</div><div style="font-size:12px;color:var(--muted)">${v.n} 場</div></div></div></div>`).join('')
    :'<div class="empty">尚無資料</div>';
  document.getElementById('report-month').innerHTML=Object.keys(byM).length
    ?Object.entries(byM).sort((a,b)=>b[0]>a[0]?1:-1).map(([m,v])=>`<div class="report-card"><div class="report-row"><div style="font-weight:600;font-size:15px">${m}</div><div style="font-size:12px;color:var(--muted)">${v.n} 場</div></div></div>`).join('')
    :'<div class="empty">尚無資料</div>';
  const done=books.filter(b=>b.status==='confirmed').reduce((s,b)=>s+(b.balance||0)+((b.sessions||[]).length||1)*2000,0);
  const dep=books.filter(b=>['deposit','reconfirm'].includes(b.status)).reduce((s,b)=>s+((b.sessions||[]).length||1)*2000,0);
  const pend=books.filter(b=>b.status==='pending').reduce((s,b)=>s+((b.sessions||[]).length||1)*2000,0);
  document.getElementById('report-money').innerHTML=`<div class="report-card">
    <div class="report-row" style="font-size:14px"><span>✅ 已完成收款</span><span style="color:var(--green);font-weight:700">${done.toLocaleString()} 元</span></div>
    <div class="report-row" style="font-size:14px"><span>🔵 已收定金（待尾款）</span><span style="color:#2255aa;font-weight:700">${dep.toLocaleString()} 元</span></div>
    <div class="report-row" style="font-size:14px"><span>🟡 待收定金</span><span style="color:var(--warn);font-weight:700">${pend.toLocaleString()} 元</span></div>
  </div>`;
}

function exportCSV(){
  if(!books.length){showToast('尚無資料可匯出');return;}
  const SL={pending:'待收定金',deposit:'已收定金',reconfirm:'待確認人數',confirmed:'已收尾款',cancelled:'已取消'};
  const headers=['姓名','英文名','電話','地區','地址','堂數','第1堂日期','第1堂時間','第2堂日期','第2堂時間','第3堂日期','第3堂時間','定金','最終人數','尾款','狀態','定金截止','確認截止'];
  const rows=books.map(b=>{
    const sessions=b.sessions||[];
    const dep=((sessions.length||1)*2000);
    return[
      b.name_zh||'',b.name_en||'',b.phone||'',b.region||'',b.addr||'',
      sessions.length,
      sessions[0]?.date||'',sessions[0]?.time||'',
      sessions[1]?.date||'',sessions[1]?.time||'',
      sessions[2]?.date||'',sessions[2]?.time||'',
      dep,b.final_pax||'',b.balance||'',
      SL[b.status]||b.status||'',b.dep_due||'',b.conf_due||''
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const bom='\uFEFF';
  const csv=bom+[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const today=new Date();
  a.download=`糖畫預約紀錄_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('匯出成功！');
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
function showToast(txt){const t=document.getElementById('toast');t.textContent=txt;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function renderAll(){
  if(document.getElementById('screen-home').classList.contains('active'))renderHome();
  if(document.getElementById('screen-list').classList.contains('active'))renderList();
  if(document.getElementById('screen-report').classList.contains('active'))renderReport();
}

async function init(){
  books=await loadBooks();
  renderAll();
}
init();
</script>
